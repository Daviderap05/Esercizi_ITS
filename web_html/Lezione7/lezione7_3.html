<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioco del Numero</title>
</head>
<body>

    <form id="game-form">
        <input type="text" name="num" id="n" placeholder="Inserisci il numero" maxlength="3">
        <input type="submit" value="Controlla">
        <br><b>Tentativi: </b><input type="text" name="cont" id="c" readonly>
        <br><input type="reset" value="Nuovo Gioco">
    </form>

    <script>
        let numeroCasuale = Math.floor(Math.random() * 101); // tra 0 e 100
        let tentativi = 0;

        document.getElementById("game-form").addEventListener("submit", function(e) {
            e.preventDefault(); // evita il reload

            let numeroScelto = parseInt(document.getElementById("n").value);

            tentativi++;

            if (numeroScelto > 100 || numeroScelto < 0) {
                alert("Il numero deve essere tra 0 e 100.");
            } else if (numeroScelto < numeroCasuale) {
                alert("Il numero da indovinare è più grande.");
            } else if (numeroScelto > numeroCasuale) {
                alert("Il numero da indovinare è più piccolo.");
            } else {
                alert("Hai indovinato! Numero di tentativi: " + tentativi);
            }

            document.getElementById('c').value = tentativi;
        });

        // resetta il gioco con il pulsante di reset
        document.querySelector("input[type='reset']").addEventListener("click", function() {
            numeroCasuale = Math.floor(Math.random() * 101);
            tentativi = 0;
            document.getElementById('c').value = "";
        });
    </script>

</body>
</html>
